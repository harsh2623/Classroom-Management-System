<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Classroom Manager{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    {% if g.user %}
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="ri-building-4-line"></i>
                <span>Classroom Occupancy</span>
            </div>
            <div class="nav-links">
                <span class="user-badge"><i class="ri-user-line"></i> {{ session.username }}</span>
                <a href="{{ url_for('logout') }}" class="btn-logout"><i class="ri-logout-box-r-line"></i> Logout</a>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <div id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Global UI Synthesized Click Sound
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playUIClick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); // High pitch start
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.07); // Quick drop
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); // Soft volume
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.07); // Quick fade
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.07);
        }

        document.addEventListener('click', function(e) {
            // Check if user clicked a button or link
            const btn = e.target.closest('button, .btn, .tab-btn, .close-btn, a, input[type="submit"]');
            if (btn) {
                playUIClick();
                
                // Add visual click ripple specifically for buttons and layout tabs
                if(btn.tagName.toLowerCase() !== 'a') {
                    // Force position relative if it acts weird
                    if (window.getComputedStyle(btn).position === 'static') btn.style.position = 'relative';
                    if (window.getComputedStyle(btn).overflow !== 'hidden') btn.style.overflow = 'hidden';
                    
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const circle = document.createElement('span');
                    circle.classList.add('ripple');
                    circle.style.left = `${x}px`;
                    circle.style.top = `${y}px`;
                    btn.appendChild(circle);
                    
                    setTimeout(() => circle.remove(), 500);
                }
            }
        });

        // Background Particle Physics Engine
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initParticles() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2.5 + 0.5,
                    dx: (Math.random() - 0.5) * 0.4,
                    dy: Math.random() * -0.6 - 0.2, // Drift upward smoothly
                    opacity: Math.random() * 0.6 + 0.1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#8b5cf6';
            
            particles.forEach(p => {
                p.x += p.dx;
                p.y += p.dy;
                // Seamless looping
                if (p.y < -10) p.y = height + 10;
                if (p.x < -10) p.x = width + 10;
                if (p.x > width + 10) p.x = -10;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(139, 92, 246, ${p.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', initParticles);
        initParticles();
        drawParticles();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
