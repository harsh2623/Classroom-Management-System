{% extends "base.html" %}

{% block title %}Sign Up - UniManage Pro{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-container glass-panel">
        <div class="login-header">
            <div class="login-icon">
                <i class="ri-user-add-line"></i>
            </div>
            <h2>Create Account</h2>
            <p>Join the Classroom Network</p>
        </div>
        
        <form action="{{ url_for('signup') }}" method="POST" class="login-form">
            {% if error %}
            <div class="alert alert-error">
                <i class="ri-error-warning-line"></i> {{ error }}
            </div>
            {% endif %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="ri-user-3-line"></i>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="off">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="ri-lock-line"></i>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
            </div>

            <div class="form-group">
                <label for="role">Status</label>
                <div class="input-wrapper">
                    <i class="ri-profile-line"></i>
                    <select name="role" id="role" required>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <span>Sign Up</span>
                <i class="ri-arrow-right-line"></i>
            </button>
        </form>
        
        <div class="login-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 500;">Sign in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
